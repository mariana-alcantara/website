<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scan</title>

<style>
@import url("https://fonts.googleapis.com/css2?family=Source+Serif+Pro:wght@200;300;350;400;500;600;700&display=swap");
  html, body {
    margin: 0;
    height: 100%;
    background: #ffffff;
    /* background: #5A61F0; */
    font-family: "Source Serif Pro", serif;
  }

  body {
    display: flex;
    flex-direction: column;
  }

  .block {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .inner {
    text-align: center;
  }

  .label {
    font-size: 1.9rem;
    font-weight: 600;
    margin-bottom: -0.2rem;
    color: #000;
  }

  img {
    /* width: 60vw; */
    width: 280px;
    height: auto;
  }
</style>
</head>

<body>

  <div class="block">
    <div class="inner">
      <p class="label">Projeto-Dourados.org:</p>
      <img src="/imagens/qrcode_pt.svg" alt="Main Website QR">
      <!-- <div class="label">Projeto Dourados (🇧🇷 Português)</div> -->
    </div>
  </div>

  <div class="block">
    <div class="inner">
        <p class="label">Contact Card:</p>
      <img src="/imagens/qrcode_contato.svg" alt="Contact Us!">
      <!--<div class="label">Projeto Dourados ( 🇺🇸 English)</div> -->
    </div>
  </div>

</body>
</html>
